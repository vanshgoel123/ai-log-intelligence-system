services:

  elasticsearch:
    image: elasticsearch:8.12.0
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
      - ES_JAVA_OPTS=-Xms512m -Xmx512m
    ports:
      - "9200:9200"
    volumes:
      - es_data:/usr/share/elasticsearch/data

  kibana:
    image: kibana:8.12.0
    container_name: kibana
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200   # BUG #3 FIX
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch

  filebeat:
    image: elastic/filebeat:8.12.0
    container_name: filebeat
    user: root      # needed to read logs volume
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - ./logs:/logs:ro
    depends_on:
      - elasticsearch

  log-generator:                          # BUG #6 FIX — containerize it
    image: python:3.10-slim
    container_name: log-generator
    volumes:
      - ./log-generator:/app
      - ./logs:/logs
    working_dir: /app
    command: python -u generate_logs.py
    environment:
      - LOG_FILE=/logs/app.log            # use absolute path

  health-check:
    build: ./health-check
    container_name: health-check
    volumes:
      - ./logs:/logs
    environment:                          # BUG #7 FIX
      - TARGET_URLS=${TARGET_URLS:-https://scholar.iiitnr.ac.in/login}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-30}
      - REQUEST_TIMEOUT=${REQUEST_TIMEOUT:-5}

  analyzer:
    build: ./analyzer
    container_name: analyzer
    environment:
      - ELASTIC_HOST=${ELASTIC_HOST:-http://elasticsearch:9200}
      - JIRA_URL=${JIRA_URL}              # BUG #4 FIX — all from .env
      - JIRA_EMAIL=${JIRA_EMAIL}
      - JIRA_TOKEN=${JIRA_TOKEN}          # no quotes, pulled from .env
      - JIRA_PROJECT=${JIRA_PROJECT:-OPS}
      - CHECK_INTERVAL=${CHECK_INTERVAL:-30}
      - DEDUP_TIME=${DEDUP_TIME:-600}
    env_file:
      - .env                              # loads your .env file
    depends_on:
      - elasticsearch

volumes:
  es_data: